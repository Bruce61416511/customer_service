<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mac Mini 智能客服</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f7f8fb; color: #222; margin: 0; padding: 0; }
    .container { max-width: 720px; margin: 0 auto; padding: 24px; }
    .panel { background: #fff; border-radius: 12px; box-shadow: 0 12px 24px rgba(0,0,0,.08); padding: 24px; }
    h1 { margin-top: 0; font-size: 28px; }
    .messages { min-height: 260px; margin-bottom: 16px; padding: 16px; background: #f4f6fb; border-radius: 12px; overflow-y: auto; max-height: 420px; }
    .message { margin-bottom: 14px; line-height: 1.6; }
    .message.user { text-align: right; }
    .message .bubble { display: inline-block; padding: 12px 16px; border-radius: 18px; max-width: 80%; }
    .message.user .bubble { background: #007aff; color: #fff; }
    .message.bot .bubble { background: #eef2ff; color: #111; }
    .input-area { display: flex; gap: 12px; }
    .input-area input { flex: 1; border: 1px solid #d9d9e0; border-radius: 999px; padding: 12px 16px; font-size: 16px; }
    .input-area button { border: none; background: #007aff; color: #fff; padding: 0 20px; border-radius: 999px; font-size: 16px; cursor: pointer; }
    .input-area button:disabled { background: #a0c4ff; cursor: not-allowed; }
    .note { margin-top: 16px; color: #555; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel">
      <h1>Mac Mini 智能客服</h1>
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <input id="messageInput" type="text" placeholder="请输入问题，例如：现在有哪些型号？" autocomplete="off" />
        <button id="sendButton">发送</button>
      </div>
      <div class="note">提示：本页面会自动记录访客状态，新访客进入后会给出欢迎引导。</div>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    let userId = localStorage.getItem('macmini_chat_userId');
    let isNewVisitor = !userId;

    if (!userId) {
      userId = 'visitor_' + Math.random().toString(36).slice(2, 12);
      localStorage.setItem('macmini_chat_userId', userId);
    }

    function appendMessage(role, text) {
      const msg = document.createElement('div');
      msg.className = 'message ' + role;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      msg.appendChild(bubble);
      messagesEl.appendChild(msg);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;
      appendMessage('user', text);
      inputEl.value = '';
      sendButton.disabled = true;
      fetch('/reply', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          userId,
          message: text,
          isNewVisitor,
          timestamp: new Date().toISOString()
        })
      })
      .then(res => res.json())
      .then(data => {
        appendMessage('bot', data.reply || '抱歉，未收到回复。');
        isNewVisitor = false;
      })
      .catch(() => {
        appendMessage('bot', '服务异常，请稍后再试。');
      })
      .finally(() => {
        sendButton.disabled = false;
      });
    }

    sendButton.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', event => {
      if (event.key === 'Enter') sendMessage();
    });

    appendMessage('bot', '欢迎使用 Mac Mini 智能客服，请输入您的问题。');
  </script>
</body>
</html>
